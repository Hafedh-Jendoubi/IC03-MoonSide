# SonarQube Cloud Project Configuration
# Place this file at the root of your User-Service directory

sonar.projectKey=moonside-user-service
sonar.projectName=Moonside User Service
sonar.projectVersion=0.0.1-SNAPSHOT

# Source & test directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Coverage report (generated by JaCoCo via mvn verify -Pcoverage)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions — don't analyze generated/config code
sonar.exclusions=\
  **/model/*.java,\
  **/dto/**/*.java,\
  **/exception/*Exception.java,\
  **/*Application.java,\
  **/config/DataSeeder.java

sonar.coverage.exclusions=\
  **/model/*.java,\
  **/dto/**/*.java,\
  **/exception/*Exception.java,\
  **/*Application.java,\
  **/config/DataSeeder.java

# Language
sonar.language=java
sonar.sourceEncoding=UTF-8