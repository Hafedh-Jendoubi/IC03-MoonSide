# Server
server.port=8085

# Application
spring.application.name=post-service

# MongoDB
spring.data.mongodb.uri=mongodb://${MONGO_ROOT_USERNAME:admin}:${MONGO_ROOT_PASSWORD:admin123}@${MONGODB_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_POST_DATABASE:post_db}?authSource=admin
spring.data.mongodb.auto-index-creation=true

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# JWT (shared secret with user-service)
jwt.secret=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── Inter-service URLs ────────────────────────────────────────────────────────
# Used by OrganizationClient to verify team/dept leadership for edit authorization.
services.organization-service.url=${ORGANIZATION_SERVICE_URL:http://localhost:8084}

# Logging
logging.level.tn.moonside.postservice=DEBUG
logging.level.org.springframework.security=INFO

# ── Jackson date/time serialization ──────────────────────────────────────────
# Serialize LocalDateTime as ISO-8601 strings (e.g. "2025-05-03T10:30:00")
# instead of numeric arrays, so the frontend can parse them with new Date().
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false

# ── MinIO (Post attachments) ───────────────────────────────────────────────────
# Internal Docker network endpoint (used by the service to talk to MinIO)
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
# Bucket dedicated to post attachments (separate from the media-service bucket)
minio.bucket=${MINIO_POST_BUCKET:post-attachments}
# Public endpoint reachable by the browser
minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}

# ── Multipart file upload limits ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=510MB