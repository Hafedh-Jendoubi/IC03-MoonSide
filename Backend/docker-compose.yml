version: "3.8"
services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}
    volumes:
      - mongodb-data:/data/db
    networks:
      - ${NETWORK_NAME}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Eureka Service Discovery
  eureka:
    build: ./Eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - moonside-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # User Microservice
  user-service:
    build: ./User-Service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - MONGODB_HOST=mongodb
      - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_DATABASE=${MONGO_DATABASE}
      - EUREKA_URI=http://eureka:8761/eureka/
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - APP_NAME=${APP_NAME}
    depends_on:
      mongodb:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - moonside-network

  # MinIO â€“ object storage for media files
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO web console
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - moonside-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Media Microservice
  media-service:
    build: ./Media-Service
    container_name: media-service
    ports:
      - "8082:8082"
    environment:
      - MONGODB_HOST=mongodb
      - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_DATABASE=media_db
      - EUREKA_URI=http://eureka:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT}
    depends_on:
      mongodb:
        condition: service_healthy
      eureka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - moonside-network

  # Organization Microservice
  organization-service:
    build: ./Organization-Service
    container_name: organization-service
    ports:
      - "8084:8084"
    environment:
      - MONGODB_HOST=mongodb
      - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_ORG_DATABASE=org_db
      - EUREKA_URI=http://eureka:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_URL=http://user-service:8081
    depends_on:
      mongodb:
        condition: service_healthy
      eureka:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - moonside-network

  # Post & Reactions Microservice
  post-service:
    build: ./Post-Service
    container_name: post-service
    ports:
      - "8085:8085"
    environment:
      - MONGODB_HOST=mongodb
      - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_POST_DATABASE=post_db
      - EUREKA_URI=http://eureka:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - ORGANIZATION_SERVICE_URL=http://organization-service:8084
    depends_on:
      mongodb:
        condition: service_healthy
      eureka:
        condition: service_healthy
      user-service:
        condition: service_started
      organization-service:
        condition: service_started
    networks:
      - moonside-network

  # API Gateway
  gateway:
    build: ./Gateway
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - moonside-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Frontend Next.js Application
  frontend:
    build: ../Frontend
    container_name: moonside-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - moonside-network

# Volumes for persistent data
volumes:
  mongodb-data:
    driver: local
  minio-data:
    driver: local

networks:
  moonside-network:
    driver: bridge
