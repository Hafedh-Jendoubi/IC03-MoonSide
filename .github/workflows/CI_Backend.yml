name: CI – Backend

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'Backend/**'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'Backend/**'

jobs:
  # ─────────────────────────────────────────────
  # 1. Build & Test – Eureka (Java 21)
  # ─────────────────────────────────────────────
  build-eureka:
    name: Build & Test Eureka
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Eureka

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & run tests
        run: |
          chmod +x mvnw
          ./mvnw verify -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eureka-test-reports
          path: Backend/Eureka/target/surefire-reports/

  # ─────────────────────────────────────────────
  # 2. Build & Test – Gateway (Java 21)
  # ─────────────────────────────────────────────
  build-gateway:
    name: Build & Test Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & run tests
        run: |
          chmod +x mvnw
          ./mvnw verify -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-test-reports
          path: Backend/Gateway/target/surefire-reports/

  # ─────────────────────────────────────────────
  # 3. Build & Test – User-Service (Java 17)
  # ─────────────────────────────────────────────
  build-user-service:
    name: Build & Test User-Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/User-Service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & run tests
        run: |
          chmod +x mvnw
          ./mvnw verify -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-service-test-reports
          path: Backend/User-Service/target/surefire-reports/

  # ─────────────────────────────────────────────
  # 4. Docker build smoke-test (no push)
  #    Runs only on feature/* pushes to catch
  #    Dockerfile errors early, before a PR.
  # ─────────────────────────────────────────────
  docker-build-check:
    name: Docker Build Smoke-Test
    runs-on: ubuntu-latest
    needs: [build-eureka, build-gateway, build-user-service]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Eureka image (no push)
        uses: docker/build-push-action@v5
        with:
          context: Backend/Eureka
          push: false
          tags: moonside/eureka:smoke-test

      - name: Build Gateway image (no push)
        uses: docker/build-push-action@v5
        with:
          context: Backend/Gateway
          push: false
          tags: moonside/gateway:smoke-test

      - name: Build User-Service image (no push)
        uses: docker/build-push-action@v5
        with:
          context: Backend/User-Service
          push: false
          tags: moonside/user-service:smoke-test