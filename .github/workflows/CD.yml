name: CD – Build & Push

on:
  push:
    branches: [dev, main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.meta.outputs.env }}
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=production" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ needs.prepare.outputs.env_name }}

    strategy:
      matrix:
        service:
          - { name: eureka,               path: Backend/Eureka,               java: 21 }
          - { name: gateway,              path: Backend/Gateway,              java: 21 }
          - { name: user-service,         path: Backend/User-Service,         java: 17, mongo: true }
          - { name: media-service,        path: Backend/Media-Service,        java: 17, mongo: true }
          - { name: organization-service, path: Backend/Organization-Service, java: 17, mongo: true }
          - { name: post-service,         path: Backend/Post-Service,         java: 17, mongo: true }
          - { name: frontend,             path: Frontend,                     node: 20 }

    services:
      mongodb:
        image: mongo:7
        ports: [27017:27017]
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin123
          MONGO_INITDB_DATABASE: admin
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Java services
      - if: matrix.service.java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.service.java }}
          distribution: temurin
          cache: maven

      - if: matrix.service.java
        working-directory: ${{ matrix.service.path }}
        env:
          MONGO_ROOT_USERNAME: admin
          MONGO_ROOT_PASSWORD: admin123
          MONGODB_HOST: localhost
          MONGO_PORT: 27017
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x mvnw
          ./mvnw verify -B

      # Frontend
      - if: matrix.service.node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - if: matrix.service.node
        working-directory: Frontend
        run: |
          npm ci
          npm test -- --passWithNoTests

      # Docker
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/moonside-${{ matrix.service.name }}:${{ needs.prepare.outputs.tag }}
            ${{ env.DOCKERHUB_USERNAME }}/moonside-${{ matrix.service.name }}:${{ needs.prepare.outputs.sha }}
