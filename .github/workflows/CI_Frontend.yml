name: CI – Frontend

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'Frontend/**'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'Frontend/**'

jobs:
  # ─────────────────────────────────────────────
  # 1. Prettier check, type-check & test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --passWithNoTests --ci

      - name: Build
        run: npm run build
        env:
          # Prevents the build from failing on warnings treated as errors
          CI: false

  # ─────────────────────────────────────────────
  # 2. Docker build smoke-test (no push)
  #    Only runs on feature/* pushes.
  # ─────────────────────────────────────────────
  docker-build-check:
    name: Docker Build Smoke-Test
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: Frontend
          push: false
          tags: moonside/frontend:smoke-test